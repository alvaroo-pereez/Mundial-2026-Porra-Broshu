name: Sync resultados Mundial

# Horarios en UTC (GitHub cron). España CEST (jun-jul) = UTC+2:
#   0 22 * * * → 00:00 hora peninsular española
#   0 4  * * * → 06:00 hora peninsular española
on:
  schedule:
    - cron: "0 22 * * *"
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Preflight automatización
        run: python verify_automation.py

      - name: Sincronizar resultados openfootball
        run: python sync_results.py

      - name: Comprobar cambios
        id: changes
        run: |
          git add output/ data/api_fixture_map.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Sin cambios que commitear."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Cambios detectados:"
            git diff --staged --name-only
          fi

      - name: Commit y push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "sync: resultados automáticos openfootball"
          git push

      - name: Disparar deploy Netlify
        if: steps.changes.outputs.changed == 'true'
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          if [ -n "$NETLIFY_BUILD_HOOK" ]; then
            curl -sS -X POST "$NETLIFY_BUILD_HOOK"
          else
            echo "NETLIFY_BUILD_HOOK no configurado; Netlify desplegará al detectar el push si está conectado a Git."
          fi
