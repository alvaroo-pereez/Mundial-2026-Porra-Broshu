name: Verificar mapeo openfootball

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Diagnóstico de emparejamiento
        run: python bootstrap_fixture_map.py

      - name: Commit informe si hay cambios
        run: |
          git add data/api_fixture_map.json
          if git diff --staged --quiet; then
            echo "Sin cambios en el informe de mapeo"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: informe mapeo openfootball"
          git push
