<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Porra Mundial 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #051C2C;
      --blue: #0066CC;
      --gold: #C5A028;
      --bg: #0a1628;
      --card: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.12);
      --text: #f5f5f5;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }
    .wrap { max-width: 520px; width: 100%; text-align: center; }
    .badge {
      display: inline-block;
      background: var(--gold);
      color: var(--navy);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      padding: 0.35rem 0.75rem;
      border-radius: 2px;
      margin-bottom: 1rem;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      letter-spacing: 0.04em;
      line-height: 0.95;
      margin-bottom: 0.5rem;
    }
    .sub { color: var(--muted); font-size: 0.95rem; margin-bottom: 2.5rem; }
    .groups { display: flex; flex-direction: column; gap: 1rem; }
    .group-card {
      display: block;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      text-align: left;
      transition: border-color 0.2s, background 0.2s;
    }
    .group-card:hover {
      border-color: var(--gold);
      background: rgba(255,255,255,0.09);
    }
    .group-card h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.04em;
      color: var(--gold);
      margin-bottom: 0.25rem;
    }
    .group-card p { color: var(--muted); font-size: 0.85rem; }
    .group-card .arrow {
      float: right;
      color: var(--blue);
      font-size: 1.25rem;
      margin-top: -1.75rem;
    }
    footer { margin-top: 2.5rem; font-size: 0.75rem; color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <span class="badge">MUNDIAL 2026</span>
    <h1>Porra Mundial 2026</h1>
    <p class="sub">Clasificación en tiempo real · Pronósticos · Apuestas especiales</p>
    <div class="groups">
      <a class="group-card" href="dashboard_broshu.html">
        <span class="arrow">→</span>
        <h2>Broshu</h2>
        <p>11 jugadores · Dashboard en vivo</p>
      </a>
      <a class="group-card" href="dashboard_papinenes.html">
        <span class="arrow">→</span>
        <h2>Papinenes</h2>
        <p>3 jugadores · Dashboard en vivo</p>
      </a>
    </div>
    <footer>Los datos se actualizan automáticamente cada 2 minutos en el navegador.</footer>
  </div>
</body>
</html>
